<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindTrack Sidebar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/_sidebar.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    <aside class="sidebar">
        <!-- Brand -->
        <div class="brand-header">
            <img src="{{ url_for('static', filename='Images/LOGO_1.png') }}" alt="MindTrack Logo" class="logo-icon">
            <div class="brand-text">
                <h1 class="brand-title">Mind<span>Track</span></h1>
                <p>Mental Health Insights</p>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="nav-menu">
            <a href="#" class="nav-item "><i class="bi bi-grid-fill"></i> Dashboard</a>
            <a href="#" class="nav-item"><i class="bi bi-person-fill"></i> Account</a>
            <a href="#" class="nav-item"><i class="bi bi-lightbulb-fill"></i> Learnings & Realizations</a>

            <script>
  // Get all nav items
  const navItems = document.querySelectorAll('.nav-item');

  navItems.forEach(item => {
    item.addEventListener('click', () => {
      // Remove active from all
      navItems.forEach(i => i.classList.remove('active'));
      // Add active to clicked
      item.classList.add('active');
    });
  });
</script>
        </nav>

        <!-- Quote -->
        <div class="quote-card">
            <p>“Awareness is the first step to meaningful change.” <i class="bi bi-heart-fill" style="color:#2BB3A3;"></i></p>
        </div>

        <!-- Logout -->
        <a href="#" class="nav-item logout-btn"><i class="bi bi-box-arrow-left"></i> Log Out</a>
    </aside>
</body>
</html>
